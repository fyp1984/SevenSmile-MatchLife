<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MatchLife</title>
  </head>
  <body>
    <script>
      (function () {
        var l = window.location;
        var repo = '/SevenSmile-MatchLife';
        var path = l.pathname;
        if (path.indexOf(repo) === 0) path = path.slice(repo.length);
        var target = repo + '/?p=' + encodeURIComponent(path + l.search + l.hash);
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
