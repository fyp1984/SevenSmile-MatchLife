services:
  matchlife-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        APP_BASE_PATH: ${APP_BASE_PATH:-/7smile-matchlife/}
        VITE_SUPABASE_PROXY_PATH: ${VITE_SUPABASE_PROXY_PATH:-/7smile-matchlife/supabase}
        VITE_WECHAT_ACCESS_VERSION: ${VITE_WECHAT_ACCESS_VERSION:-docker-local}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://175.178.236.183:8000}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6Im1hdGNobGlmZS1zZWxmLWhvc3RlZCIsImlhdCI6MTc3NjYwODkxMywiZXhwIjoxOTM0Mjg4OTEzfQ.dGN2lG3BvRNJCBZ7sFXcjtxqDAO10Vh-BBuxkRED3kY}
        VITE_DATA_SOURCE_PASSWORD: ${VITE_DATA_SOURCE_PASSWORD:-7%K$$QJ2pWtgw}
    ports:
      - "${LOCAL_WEB_PORT:-18080}:80"
    environment:
      APP_PATH: ${APP_PATH:-/7smile-matchlife}
      SUPABASE_REST_UPSTREAM: ${SUPABASE_REST_UPSTREAM:-http://175.178.236.183:8000}
      SUPABASE_REST_HOST_HEADER: ${SUPABASE_REST_HOST_HEADER:-175.178.236.183}
    depends_on:
      - wechat-access
    restart: unless-stopped

  wechat-access:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    command: ["node", "wechat-oauth-server.mjs"]
    environment:
      WECHAT_OAUTH_HOST: 0.0.0.0
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:18080}
      APP_BASE_PATH: ${APP_BASE_PATH:-/7smile-matchlife}
      WECHAT_ACCESS_CODES: ${WECHAT_ACCESS_CODES:-7SMILE-ML-LOCAL}
      WECHAT_ACCESS_KEYWORD: ${WECHAT_ACCESS_KEYWORD:-比赛生涯}
      WECHAT_ACCESS_VERSION: ${VITE_WECHAT_ACCESS_VERSION:-docker-local}
      WECHAT_SESSION_TTL_SECONDS: ${WECHAT_SESSION_TTL_SECONDS:-43200}
      WECHAT_ACCESS_LINK_TTL_SECONDS: ${WECHAT_ACCESS_LINK_TTL_SECONDS:-600}
      MATCHLIFE_SYNC_RUNTIME_DIR: /runtime
      MATCHLIFE_SYNC_ONCE_SCRIPT: /runtime/run-sync-once.mjs
      MATCHLIFE_HEARTBEAT_FILE: /runtime-state/heartbeat.json
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://175.178.236.183:8000}
      SUPABASE_URL: ${SUPABASE_URL:-http://175.178.236.183:8000}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SYNC_RACE_ID: ${SYNC_RACE_ID:-38653}
      SYNC_RACE_IDS: ${SYNC_RACE_IDS:-}
      SYNC_TOURNAMENT_NAME: ${SYNC_TOURNAMENT_NAME:-2026年全国U系列羽毛球比赛U12-14(北方赛区)-单项赛}
    volumes:
      - matchlife-runtime-state:/runtime-state
    restart: unless-stopped

  sync-watcher:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    command:
      - sh
      - -lc
      - node watch-ymq.mjs "${SYNC_RACE_ID:-38653}" "${SYNC_TOURNAMENT_NAME:-2026年全国U系列羽毛球比赛U12-14(北方赛区)-单项赛}"
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://175.178.236.183:8000}
      SUPABASE_URL: ${SUPABASE_URL:-http://175.178.236.183:8000}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      MATCHLIFE_HEARTBEAT_FILE: /runtime-state/heartbeat.json
      MATCHLIFE_STATE_FILE: /runtime-state/sync-state.json
      MATCHLIFE_DISCOVERY_INTERVAL_MS: ${MATCHLIFE_DISCOVERY_INTERVAL_MS:-30000}
      MATCHLIFE_ACTIVE_INTERVAL_MS: ${MATCHLIFE_ACTIVE_INTERVAL_MS:-1500}
      MATCHLIFE_IDLE_FAST_INTERVAL_MS: ${MATCHLIFE_IDLE_FAST_INTERVAL_MS:-10000}
      MATCHLIFE_ACTIVE_IDLE_MS: ${MATCHLIFE_ACTIVE_IDLE_MS:-60000}
      MATCHLIFE_ACTIVE_PAGES: ${MATCHLIFE_ACTIVE_PAGES:-2}
      MATCHLIFE_QUIET_HOURS_START_HOUR: ${MATCHLIFE_QUIET_HOURS_START_HOUR:-23}
      MATCHLIFE_QUIET_HOURS_END_HOUR: ${MATCHLIFE_QUIET_HOURS_END_HOUR:-8}
      MATCHLIFE_QUIET_HOURS_TIMEZONE: ${MATCHLIFE_QUIET_HOURS_TIMEZONE:-Asia/Shanghai}
      MATCHLIFE_QUIET_HEARTBEAT_INTERVAL_MS: ${MATCHLIFE_QUIET_HEARTBEAT_INTERVAL_MS:-120000}
      MATCHLIFE_IDLE_WARM_AFTER_MS: ${MATCHLIFE_IDLE_WARM_AFTER_MS:-600000}
      MATCHLIFE_IDLE_WARM_INTERVAL_MS: ${MATCHLIFE_IDLE_WARM_INTERVAL_MS:-30000}
      MATCHLIFE_IDLE_COOL_AFTER_MS: ${MATCHLIFE_IDLE_COOL_AFTER_MS:-1800000}
      MATCHLIFE_IDLE_COOL_INTERVAL_MS: ${MATCHLIFE_IDLE_COOL_INTERVAL_MS:-60000}
      MATCHLIFE_ERROR_BACKOFF_BASE_MS: ${MATCHLIFE_ERROR_BACKOFF_BASE_MS:-5000}
      MATCHLIFE_ERROR_BACKOFF_MAX_MS: ${MATCHLIFE_ERROR_BACKOFF_MAX_MS:-120000}
      MATCHLIFE_AUTO_PAUSE_IDLE_MS: ${MATCHLIFE_AUTO_PAUSE_IDLE_MS:-86400000}
      MATCHLIFE_AUTO_PAUSE_ERROR_MS: ${MATCHLIFE_AUTO_PAUSE_ERROR_MS:-86400000}
      MATCHLIFE_PAUSED_HEARTBEAT_INTERVAL_MS: ${MATCHLIFE_PAUSED_HEARTBEAT_INTERVAL_MS:-300000}
      YMQ_HTTP_TIMEOUT_MS: ${YMQ_HTTP_TIMEOUT_MS:-12000}
      SYNC_RACE_ID: ${SYNC_RACE_ID:-38653}
      SYNC_RACE_IDS: ${SYNC_RACE_IDS:-}
      SYNC_TOURNAMENT_NAME: ${SYNC_TOURNAMENT_NAME:-2026年全国U系列羽毛球比赛U12-14(北方赛区)-单项赛}
    volumes:
      - matchlife-runtime-state:/runtime-state
    restart: unless-stopped

volumes:
  matchlife-runtime-state:
